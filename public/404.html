<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect to index with the path encoded in the query string
      // so the SPA can reconstruct it. pathSegmentsToKeep=1 preserves /pokedex/.
      var l = window.location;
      var segs = 1;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segs).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segs).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
